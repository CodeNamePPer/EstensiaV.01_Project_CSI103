<!--buy panel-->
<div id="buy-panel-container" class="buy-panel-container">
    <div class="panel">
        <div class="title">Choose an Upgrade</div>
        <div style="font-family: 'Press Start 2P', cursive; color: #cfd3ff; margin-bottom: 20px;">coins: <span
                id="coinCount" class="sys-green">0</span></div>
        <div class="cards">
            <!-- Cards will be injected by buy.js -->
        </div>
        <div class="message" id="messageBox">Choose an upgrade and press Buy to reveal the result.</div>
        <div class="buttons">
            <button id="refreshBtn">Refresh</button>
            <button id="buyBtn">Buy</button>
            <button id="closeBtn">Close</button>
        </div>
    </div>
</div>
